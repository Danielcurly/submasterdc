version: '3.8'

services:
  submasterdc:
    image: danie/submasterdc:v0.1 # Replace with actual image tag once published
    container_name: submasterdc
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/data/models
      - /path/to/your/media:/media # Map your NAS media directory here
    environment:
      - PUID=1026 # Replace with your NAS user ID
      - PGID=100 # Replace with your NAS group ID
      - TZ=Europe/Madrid
